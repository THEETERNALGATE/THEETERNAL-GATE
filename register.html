<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>THE ETERNAL GATE — Hunter Registration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@300;400;700;900&family=Share+Tech+Mono&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--neon-blue:#00ccff;--neon-red:#ff0044;--neon-gold:#ffcc44;--dark-bg:#010105;--panel-bg:rgba(5,12,25,0.94);--text-main:#eef5ff;--text-dim:#6a8aaa;--border-glow:rgba(0,204,255,0.3);--font-title:'Saira Condensed',sans-serif;--font-mono:'Share Tech Mono',monospace;--font-th:'Noto Sans Thai',sans-serif}
body{background:var(--dark-bg);color:var(--text-main);font-family:var(--font-title),var(--font-th),sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden}
.bg-layer{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(0,80,130,0.3)0%,transparent 60%),radial-gradient(ellipse 40% 40% at 90% 80%,rgba(170,0,255,0.1)0%,transparent 70%),#010105}
.scanlines{position:fixed;inset:0;z-index:-1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,204,255,0.02)2px,rgba(0,204,255,0.02)4px);animation:scanMove 10s linear infinite}
@keyframes scanMove{0%{background-position:0 0}100%{background-position:0 200px}}
.glitch{position:fixed;inset:0;z-index:-1;pointer-events:none;background:transparent;animation:glitchFlash 12s infinite steps(1)}
@keyframes glitchFlash{0%,100%{background:transparent}1%{background:rgba(255,0,68,0.02)}3%{background:rgba(0,204,255,0.01)}95%{background:transparent}}
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:var(--neon-blue);border-radius:50%;opacity:0;animation:floatUp var(--dur,10s) var(--delay,0s) ease-in infinite;box-shadow:0 0 3px var(--neon-blue)}
@keyframes floatUp{0%{transform:translateY(100vh) translateX(0);opacity:0}15%{opacity:0.5}85%{opacity:0.2}100%{transform:translateY(-10vh) translateX(var(--drift,30px));opacity:0}}
.corner{position:fixed;z-index:5;width:48px;height:48px;border-color:rgba(0,204,255,0.4);border-style:solid;pointer-events:none}
.c-tl{top:20px;left:20px;border-width:2px 0 0 2px}
.c-tr{top:20px;right:20px;border-width:2px 2px 0 0}
.c-bl{bottom:20px;left:20px;border-width:0 0 2px 2px}
.c-br{bottom:20px;right:20px;border-width:0 2px 2px 0}
.register-container{width:100%;max-width:520px;animation:panelAppear 0.6s ease-out}
@keyframes panelAppear{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
.register-panel{background:var(--panel-bg);backdrop-filter:blur(8px);border:1px solid var(--border-glow);box-shadow:0 0 40px rgba(0,204,255,0.1)}
.panel-header{padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,204,255,0.15);background:rgba(0,204,255,0.02)}
.panel-header-title{font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase}
.panel-header-dots{display:flex;gap:8px}
.dot{width:8px;height:8px;border-radius:50%}
.dot-red{background:#ff3366;box-shadow:0 0 5px #ff3366;animation:pulseRed 2s infinite}
.dot-gold{background:#ffcc44;box-shadow:0 0 5px #ffcc44}
.dot-blue{background:var(--neon-blue);box-shadow:0 0 8px var(--neon-blue);animation:pulseBlue 1.8s infinite}
@keyframes pulseRed{0%,100%{opacity:0.7}50%{opacity:0.2}}
@keyframes pulseBlue{0%,100%{opacity:0.9}50%{opacity:0.3}}
.panel-body{padding:36px 32px 44px}
.system-alert{font-family:var(--font-mono);font-size:9px;color:var(--neon-blue);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:16px;opacity:0.7;animation:pulseText 3s infinite}
@keyframes pulseText{0%,100%{opacity:0.6}50%{opacity:1}}
.game-title{font-family:var(--font-title);font-weight:900;font-size:2rem;letter-spacing:0.08em;background:linear-gradient(135deg,#fff,var(--neon-blue),#aa88ff);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 20px rgba(0,204,255,0.3);margin-bottom:6px}
.game-sub{font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;color:var(--text-dim);margin-bottom:28px}
.field{margin-bottom:20px}
.field-label{display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
.field-input{width:100%;padding:14px 18px;background:rgba(0,204,255,0.03);border:1px solid rgba(0,204,255,0.2);color:var(--text-main);font-family:var(--font-mono);font-size:14px;outline:none;transition:all 0.2s}
.field-input:focus{border-color:var(--neon-blue);background:rgba(0,204,255,0.06);box-shadow:0 0 12px rgba(0,204,255,0.1)}
.pin-group{display:flex;gap:12px;align-items:center}
.pin-input{flex:1;text-align:center;letter-spacing:0.2em;font-size:1.2rem;font-weight:bold}
.btn-register{width:100%;padding:16px;margin-top:16px;background:linear-gradient(135deg,transparent,rgba(0,204,255,0.08));border:1px solid var(--neon-gold);color:var(--neon-gold);font-family:var(--font-title);font-weight:700;font-size:14px;letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:all 0.3s}
.btn-register::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,204,68,0.2),transparent);transition:left 0.5s}
.btn-register:hover::before{left:100%}
.btn-register:hover{background:rgba(255,204,68,0.15);box-shadow:0 0 20px rgba(255,204,68,0.3);color:#fff}
.btn-register:disabled{opacity:0.5;cursor:not-allowed}
.status-msg{margin-top:20px;padding:12px 16px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.05em;display:none;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.status-msg.error{display:block;border-left:3px solid var(--neon-red);background:rgba(255,0,68,0.05);color:#ff88aa}
.status-msg.success{display:block;border-left:3px solid var(--neon-gold);background:rgba(255,204,68,0.05);color:var(--neon-gold)}
.status-msg.loading{display:block;border-left:3px solid var(--text-dim);background:rgba(0,204,255,0.02);color:var(--text-dim)}
.spinner{display:inline-block;width:11px;height:11px;border:1px solid rgba(0,204,255,0.3);border-top-color:var(--neon-blue);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{text-align:center;margin-top:24px}
.back-link a{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;color:var(--text-dim);text-decoration:none;transition:color 0.2s}
.back-link a:hover{color:var(--neon-blue)}
.system-line{margin-top:28px;font-family:var(--font-mono);font-size:8px;letter-spacing:0.1em;color:var(--text-dim);display:flex;align-items:center;gap:10px}
.system-line::before{content:'';display:inline-block;width:28px;height:1px;background:var(--text-dim)}
.power-section{margin:20px 0 10px;padding:12px;border:1px solid rgba(0,204,255,0.2);background:rgba(0,0,0,0.3)}
.power-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;color:var(--text-dim);display:flex;justify-content:space-between;margin-bottom:6px}
.power-bar-bg{height:4px;background:rgba(0,204,255,0.1);overflow:hidden}
.power-bar{width:0%;height:100%;background:linear-gradient(90deg,var(--neon-blue),#fff);transition:width 0.8s cubic-bezier(0.2,0.9,0.4,1.1)}
.power-text{font-family:var(--font-mono);font-size:8px;color:var(--neon-blue);margin-top:6px;text-align:right;animation:pulseText 2s infinite}
@media (max-width:550px){.panel-body{padding:24px 20px 32px}.game-title{font-size:1.6rem}.pin-group{flex-direction:column;gap:8px}}
</style>
</head>
<body>
<div class="bg-layer"></div><div class="scanlines"></div><div class="glitch"></div><div class="particles" id="particles"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div><div class="corner c-bl"></div><div class="corner c-br"></div>
<div class="register-container">
  <div class="register-panel">
    <div class="panel-header"><span class="panel-header-title">SYSTEM // HUNTER AWAKENING</span><div class="panel-header-dots"><div class="dot dot-red"></div><div class="dot dot-gold"></div><div class="dot dot-blue"></div></div></div>
    <div class="panel-body">
      <div class="system-alert">[ AWAKENING PROTOCOL ] — New Hunter detected</div>
      <div class="game-title">THE ETERNAL GATE</div><div class="game-sub">REGISTRATION · AWAKENING SEQUENCE</div>
      <div class="field"><label class="field-label" for="regUsername">// HUNTER USERNAME (ใช้เข้าสู่ระบบ)</label><input class="field-input" type="text" id="regUsername" placeholder="ShadowHunter" maxlength="30" autocomplete="off"></div>
      <div class="field"><label class="field-label" for="regEmail">// CONTACT EMAIL (สำหรับยืนยันตัวตน)</label><input class="field-input" type="email" id="regEmail" placeholder="hunter@example.com" autocomplete="email"></div>
      <div class="field"><label class="field-label" for="regPassword">// ACCESS CODE</label><input class="field-input" type="password" id="regPassword" placeholder="อย่างน้อย 8 ตัวอักษร" autocomplete="new-password"></div>
      <div class="field"><label class="field-label" for="regConfirm">// CONFIRM ACCESS CODE</label><input class="field-input" type="password" id="regConfirm" placeholder="พิมพ์รหัสผ่านอีกครั้ง" autocomplete="off"></div>
      <div class="field"><label class="field-label" for="regPin">// TRANSACTION PIN (6 DIGITS)</label><div class="pin-group"><input class="field-input pin-input" type="password" id="regPin" placeholder="●●●●●●" maxlength="6" inputmode="numeric" pattern="[0-9]*"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);">ใช้ยืนยันการซื้อขาย</span></div></div>
      <div class="power-section"><div class="power-label"><span>AWAKENING POWER</span><span id="powerPercent">0%</span></div><div class="power-bar-bg"><div class="power-bar" id="powerBar"></div></div><div class="power-text" id="powerMessage">[ SYSTEM: Awakening energy charging... ]</div></div>
      <button class="btn-register" id="registerBtn">[ BEGIN AWAKENING ]</button>
      <div class="status-msg" id="registerStatus"></div>
      <div class="back-link"><a href="index.html">⌂ กลับสู่หน้าแรก</a> &nbsp;|&nbsp;<a href="login.html">⌘ มีบัญชีแล้ว? เข้าสู่ระบบ</a></div>
      <div class="system-line">ข้อมูลส่วนตัวปลอดภัย 100%</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  // สร้าง Supabase client แบบปลอดภัย - ใช้ namespace เพื่อไม่ให้ชนกับตัวแปรอื่น
  const SUPABASE_URL = 'https://ejurtaivfrozzhassvgf.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqdXJ0YWl2ZnJvenpoYXNzdmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTM5MTYsImV4cCI6MjA5MDMyOTkxNn0.m9LaUaK3eRwY_TxdI0aCrnEASsqE4WdIioALfYVjVI0';
  if (!window.__eternalGateSupabase) {
    window.__eternalGateSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  }
  const supabase = window.__eternalGateSupabase;

  // Particles
  (function initParticles() {
    const container = document.getElementById('particles');
    if(!container) return;
    const count = Math.min(20, window.innerWidth < 700 ? 12 : 20);
    for(let i=0;i<count;i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const dur = 5 + Math.random() * 10;
      const delay = -Math.random() * 12;
      const drift = (Math.random() - 0.5) * 70;
      p.style.cssText = `left:${Math.random()*100}%;--dur:${dur}s;--delay:${delay}s;--drift:${drift}px`;
      container.appendChild(p);
    }
  })();

  // Power bar update
  function updatePowerBar() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const pin = document.getElementById('regPin').value;
    let percent = 0;
    if (username.length >= 3) percent += 20;
    if (email.includes('@') && email.includes('.')) percent += 20;
    if (password.length >= 8) percent += 20;
    if (confirm.length >= 8 && password === confirm) percent += 20;
    if (pin.length === 6) percent += 20;
    const powerBar = document.getElementById('powerBar');
    const percentSpan = document.getElementById('powerPercent');
    const msgSpan = document.getElementById('powerMessage');
    if(powerBar) powerBar.style.width = percent + '%';
    if(percentSpan) percentSpan.innerText = percent + '%';
    if(msgSpan) {
      if(percent === 100) {
        msgSpan.innerHTML = '[ SYSTEM: Awakening energy full. Ready to become a Hunter. ]';
        msgSpan.style.color = 'var(--neon-gold)';
      } else {
        msgSpan.innerHTML = '[ SYSTEM: Awakening energy charging... ]';
        msgSpan.style.color = 'var(--neon-blue)';
      }
    }
  }
  ['regUsername','regEmail','regPassword','regConfirm','regPin'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('input', updatePowerBar);
  });
  updatePowerBar();

  // PIN only digits
  const pinInput = document.getElementById('regPin');
  if(pinInput) {
    pinInput.addEventListener('input', function(e) {
      this.value = this.value.replace(/[^0-9]/g, '').slice(0,6);
      updatePowerBar();
    });
  }

  function setStatus(type, message) {
    const el = document.getElementById('registerStatus');
    if(!el) return;
    el.className = `status-msg ${type}`;
    if(type === 'loading') {
      el.innerHTML = `<span class="spinner"></span>${message}`;
    } else {
      const prefix = type === 'error' ? '[ AWAKENING FAILED ] ' : '[ AWAKENING SUCCESS ] ';
      el.innerHTML = prefix + message;
    }
  }
  function setLoading(loading) {
    const btn = document.getElementById('registerBtn');
    if(btn) btn.disabled = loading;
  }

  async function handleRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const pin = document.getElementById('regPin').value;
    if(!username || !email || !password || !confirm || !pin) {
      setStatus('error', 'กรุณากรอกข้อมูลให้ครบทุกช่อง');
      return;
    }
    if(username.length < 3) { setStatus('error', 'Username ต้องมีอย่างน้อย 3 ตัวอักษร'); return; }
    if(!email.includes('@') || !email.includes('.')) { setStatus('error', 'กรุณากรอกอีเมลให้ถูกต้อง'); return; }
    if(password.length < 8) { setStatus('error', 'Access Code ต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
    if(password !== confirm) { setStatus('error', 'รหัสผ่านไม่ตรงกัน'); return; }
    if(!/^\d{6}$/.test(pin)) { setStatus('error', 'Transaction PIN ต้องเป็นตัวเลข 6 หลักเท่านั้น'); return; }
    setLoading(true);
    setStatus('loading', 'กำลังทำการ Awakening...');
    const { data: existingUser } = await supabase.from('profiles').select('username').eq('username', username).maybeSingle();
    if(existingUser) {
      setStatus('error', 'Username "' + username + '" ถูกใช้แล้ว');
      setLoading(false);
      return;
    }
    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { username, display_name: username, transaction_pin: pin } }
    });
    if(error) {
      let errMsg = error.message;
      if(errMsg.includes('already registered')) errMsg = 'อีเมลนี้ถูกลงทะเบียนแล้ว';
      if(errMsg.includes('rate limit')) errMsg = 'ลองใหม่อีกครั้งใน 1 นาที';
      setStatus('error', errMsg);
      setLoading(false);
      return;
    }
    setStatus('success', 'Awakening สำเร็จ! กำลังนำคุณสู่หน้าสร้างตัวละคร...');
    setTimeout(() => { window.location.href = 'create-character.html'; }, 2000);
  }
  const btn = document.getElementById('registerBtn');
  if(btn) btn.addEventListener('click', handleRegister);
  document.querySelectorAll('#regPassword, #regConfirm, #regPin, #regEmail, #regUsername').forEach(input => {
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleRegister(); });
  });
})();
</script>
</body>
</html>
